<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaniKani Master Sentences</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>WaniKani Master Sentences</h1>
    </header>

    <main class="app-main" id="app-root">
      <section id="token-sync-controls" aria-labelledby="token-sync-heading">
        <h2 id="token-sync-heading">Token &amp; Sync Controls</h2>
        <div id="token-sync-content"></div>
      </section>

      <section id="status-area" aria-live="polite" aria-labelledby="status-heading">
        <h2 id="status-heading">Status</h2>
        <div id="status-content"></div>
      </section>

      <section id="search-filter-controls" aria-labelledby="filters-heading">
        <h2 id="filters-heading">Search &amp; Filters</h2>
        <div id="filters-content"></div>
      </section>

      <section id="results-area" aria-labelledby="results-heading">
        <h2 id="results-heading">Results</h2>
        <div id="results-content"></div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
