<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaniKani Master Sentences</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>WaniKani Master Sentences</h1>
    </header>

    <main class="app-main" id="app-root">
      <section id="token-sync-controls" aria-labelledby="token-sync-heading">
        <h2 id="token-sync-heading">Token &amp; Sync Controls</h2>
        <div id="token-sync-content"></div>
      </section>

      <section id="status-area" aria-live="polite" aria-labelledby="status-heading">
        <h2 id="status-heading">Status</h2>
        <div id="status-content"></div>
      </section>

      <section id="search-filter-controls" aria-labelledby="filters-heading">
        <h2 id="filters-heading">Search &amp; Filters</h2>
        <div id="filters-content"></div>
      </section>

      <section id="results-area" aria-labelledby="results-heading">
        <h2 id="results-heading">Results</h2>
        <div id="results-content"></div>
      </section>
    </main>

    <script src="js/app.bundle.js"></script>
    <script>
      (() => {
        const appRoot = document.getElementById("app-root");
        const statusContent = document.getElementById("status-content");

        const showBootstrapWarning = (message) => {
          const container = statusContent ?? appRoot;
          if (!container) {
            return;
          }

          const existingWarning = container.querySelector('[data-bootstrap-warning="true"]');
          if (existingWarning) {
            return;
          }

          const warning = document.createElement("p");
          warning.setAttribute("data-bootstrap-warning", "true");
          warning.style.cssText =
            "margin:0 0 1rem;padding:0.75rem 1rem;border:1px solid #b45309;background:#fffbeb;color:#78350f;font-weight:600;";
          warning.textContent = message;
          container.prepend(warning);
        };

        if (location.protocol === "file:") {
          showBootstrapWarning(
            "This app should be served over http://localhost (not opened directly as a file)."
          );
        }

        window.addEventListener(
          "error",
          (event) => {
            const target = event.target;
            if (!(target instanceof HTMLScriptElement)) {
              return;
            }

            const scriptUrl = new URL(target.src, location.href);
            if (!scriptUrl.pathname.endsWith("/js/app.js")) {
              return;
            }

            showBootstrapWarning(
              "Unable to load js/app.js. Please run this app from http://localhost and verify the JavaScript files are accessible."
            );
          },
          true
        );
      })();
    </script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
